# Configuration Prometheus pour le monitoring du modèle ML
# TODO: Ajouter les targets supplémentaires si nécessaire

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ticket-classifier-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"


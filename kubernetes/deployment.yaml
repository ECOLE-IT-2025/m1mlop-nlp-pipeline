# Kubernetes Deployment pour l'API de classification
# TODO: Compléter les sections manquantes

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-classifier-api
  labels:
    app: ticket-classifier
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticket-classifier
  template:
    metadata:
      labels:
        app: ticket-classifier
        version: v1
    spec:
      containers:
        - name: api
          image: ticket-classifier-api:latest
          ports:
            - containerPort: 8000
